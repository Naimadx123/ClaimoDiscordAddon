# ClaimoDiscordAddon configuration.
# Changes to the command, bot token, guild id, intents, or storage type require a full server
# restart; messages and voucher-driven slash commands can be applied with /<command> reload.

# The base in-game command.
command: claimodiscord

bot:
  # Your Discord bot token from https://discord.com/developers/applications
  token: "PASTE-YOUR-BOT-TOKEN-HERE"
  # The id of the Discord server (guild) all requirements are checked against.
  # Enable Developer Mode in Discord, right-click the server, "Copy Server ID".
  guild-id: "0"
  # Custom status text shown on the bot's profile. Leave empty to disable.
  activity: "/code on the server"
  # Privileged gateway intents. Each one must also be enabled in the Developer Portal
  # (Bot -> Privileged Gateway Intents) or the bot will fail to start.
  intents:
    # Required for the discord_status requirement (reading a member's custom status).
    presences: false
    # Caches all members for faster member/role/booster checks. Optional:
    # without it those checks still work via on-demand REST lookups.
    members: false

# Where player -> Discord account links (and message/command counters) are stored.
# type: yaml | sqlite | mysql | mariadb | postgresql
#   yaml   -> plugins/ClaimoDiscordAddon/links.yml  (no setup, single server)
#   sqlite -> plugins/ClaimoDiscordAddon/links.db   (no setup, single server)
#   mysql / mariadb / postgresql -> shared database (multi-server friendly)
# Changing the storage type requires a server restart.
storage:
  type: yaml
  host: localhost
  port: 3306
  database: claimodiscord
  username: root
  password: ""
  table-prefix: claimodiscord_
  pool-size: 10

link:
  # Length of the one-time code generated by /claimodiscord link.
  code-length: 6
  # How long a generated link code stays valid, in seconds.
  code-expiry-seconds: 300

# Text shown on the Discord side (plain text, not MiniMessage).
# Players link by clicking a button on a panel message and pasting their code in a modal,
# so no slash command is needed for linking.
discord:
  # The link panel: post it with /claimodiscord panel [channel-id]. The button and modal on it
  # keep working after a bot restart, since Discord sends the button id with each click.
  # Default channel for /claimodiscord panel when no id is given (0 = must pass one).
  panel-channel-id: "0"
  # The panel embed players see with the button.
  panel-embed-title: "Link your Minecraft account"
  panel-embed-description: "Run /claimodiscord link in-game to get a code, then click the button below and paste it."
  panel-embed-color: "#5865F2"
  # The button and the popup (modal) it opens.
  link-button-label: "Link account"
  link-modal-title: "Link your Minecraft account"
  link-modal-field-label: "Code"
  link-modal-field-placeholder: "Paste the code from /claimodiscord link"

  # The successful link confirmation is sent as an embed. %player% = the Discord display name.
  link-success: "Linked to **%player%**. You can close this."
  # Title, hex color, and footer of that embed.
  link-embed-title: "Account linked"
  link-embed-color: "#57F287"
  link-embed-footer: "Claimo"
  # Reply when the entered code is wrong or expired.
  link-invalid: "That code is invalid or has expired. Run `/claimodiscord link` in-game to get a new one."
  # Reply when the target account is already linked to a different Discord user.
  link-taken: "That Minecraft account is already linked to another Discord user."
  # Reply after using an admin-defined discord_command. %used% = this user's count, %amount% = target.
  command-reply: "Recorded! (%used%/%amount% for this reward)"
